<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    /* Google Fonts — fetched by WeasyPrint at render time */
    @import url('https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Lato:wght@400;600;700&display=swap');

    @page {
      size: letter;
      margin: 0.75in;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /*
      base_font_size is set by the view via binary search so everything
      fits on one page. All sizes below use em so they scale in proportion.
      Default 10.5pt; falls to 7pt minimum.
    */
    body {
      font-family: 'Calibri', 'Lato', 'Liberation Sans', Arial, sans-serif;
      font-size: {{ base_font_size|default:"10.5" }}pt;
      color: #000;
      line-height: 1.45;
    }

    /* ---- Header ---- */
    .resume-header {
      text-align: center;
      margin-bottom: 0.85em;
      border-bottom: 2px solid #1e3a5f;
      padding-bottom: 0.57em;
    }
    .resume-name {
      font-family: 'Merriweather', Georgia, 'Times New Roman', serif;
      font-size: 2.1em;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .resume-contact {
      margin-top: 0.35em;
      font-size: 0.9em;
      color: #333;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.21em 1.0em;
    }
    .resume-contact a { color: #2d6a9f; text-decoration: none; }

    /* ---- Sections ---- */
    .resume-section { margin-bottom: 0.85em; }
    .section-title {
      font-family: 'Merriweather', Georgia, 'Times New Roman', serif;
      font-size: 1.05em;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #1e3a5f;
      border-bottom: 1.5px solid #1e3a5f;
      padding-bottom: 0.15em;
      margin-bottom: 0.43em;
    }

    .summary-text { font-size: 0.95em; line-height: 1.55; }

    .exp-entry, .edu-entry, .cert-entry, .proj-entry {
      margin-bottom: 0.64em;
      page-break-inside: avoid;
    }
    .exp-header, .edu-header, .proj-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .company-name, .institution-name, .proj-name { font-weight: 700; font-size: 1em; }
    .date-range  { font-size: 0.9em; color: #555; white-space: nowrap; }
    .exp-location { font-size: 0.9em; color: #555; font-style: italic; margin-bottom: 0.15em; }
    .edu-degree  { font-size: 0.95em; margin-top: 0.1em; }
    .cert-entry  { font-size: 0.95em; }
    .cert-name   { font-weight: 600; }
    .cert-issuer { color: #555; }
    .cert-date   { color: #555; font-size: 0.9em; }
    .proj-tech   { font-size: 0.9em; color: #2d6a9f; font-style: italic; }
    .bullet-list { margin: 0.2em 0 0 1.15em; padding: 0; }
    .bullet-list li { font-size: 0.95em; margin-bottom: 0.15em; line-height: 1.45; }

    /* ---- Contact icons ---- */
    .contact-item { display: inline-flex; align-items: center; gap: 0.22em; }
    .contact-icon { width: 0.9em; height: 0.9em; flex-shrink: 0; vertical-align: middle; }

    /* ---- Experience sub-header (designation | location) ---- */
    .exp-subheader { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.2em; }
    .exp-designation { font-style: italic; font-size: 0.95em; color: #333; }

    /* ---- Skills ---- */
    .skills-row { display: flex; gap: 0.5em; margin-bottom: 0.3em; font-size: 0.95em; }
    .skills-label { font-weight: 700; min-width: 5.5em; color: #1e3a5f; }
    .skills-list { color: #222; }
  </style>
</head>
<body>
  {% include "builder/resume_content.html" %}
</body>
</html>
