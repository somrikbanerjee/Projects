<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    @page {
      size: letter;
      margin: 0.75in;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 10.5pt;
      color: #000;
      line-height: 1.45;
    }

    .resume-header {
      text-align: center;
      margin-bottom: 10px;
      border-bottom: 2px solid #1e3a5f;
      padding-bottom: 8px;
    }
    .resume-name {
      font-size: 22pt;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .resume-contact {
      margin-top: 4px;
      font-size: 9.5pt;
      color: #333;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 3px 14px;
    }
    .resume-contact a { color: #2d6a9f; text-decoration: none; }

    .resume-section { margin-bottom: 12px; }
    .section-title {
      font-size: 11pt;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #1e3a5f;
      border-bottom: 1.5px solid #1e3a5f;
      padding-bottom: 2px;
      margin-bottom: 6px;
    }

    .summary-text { font-size: 10pt; line-height: 1.55; }

    .exp-entry, .edu-entry, .cert-entry, .proj-entry {
      margin-bottom: 9px;
      page-break-inside: avoid;
    }
    .exp-header, .edu-header, .proj-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .company-name, .institution-name, .proj-name { font-weight: 700; font-size: 10.5pt; }
    .date-range { font-size: 9.5pt; color: #555; white-space: nowrap; }
    .exp-location { font-size: 9.5pt; color: #555; font-style: italic; margin-bottom: 2px; }
    .edu-degree { font-size: 10pt; margin-top: 1px; }
    .cert-name { font-weight: 600; }
    .cert-issuer, .cert-date { color: #555; }
    .cert-date { font-size: 9.5pt; }
    .proj-tech { font-size: 9.5pt; color: #2d6a9f; font-style: italic; }
    .bullet-list { margin: 3px 0 0 16px; padding: 0; }
    .bullet-list li { font-size: 10pt; margin-bottom: 2px; line-height: 1.45; }
  </style>
</head>
<body>
  {% include "builder/resume_content.html" %}
</body>
</html>
